<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixiv Helper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 260px;
      padding: 14px 12px 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #333;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: #0096fa;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin-bottom: 10px;
    }

    button {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      color: #333;
    }

    button:hover {
      background: #f0f8ff;
      border-color: #0096fa;
    }

    button:active {
      background: #e0f0ff;
    }

    #allBtn {
      background: linear-gradient(135deg, #0096fa, #005ce6);
      color: #fff;
      border-color: transparent;
      font-weight: 600;
    }

    #allBtn:hover {
      background: linear-gradient(135deg, #00aaff, #0070ff);
    }

    .btn-icon {
      font-size: 15px;
    }

    .status {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      text-align: center;
      min-height: 16px;
      transition: color 0.2s;
    }

    .status.success { color: #2e7d32; }
    .status.error   { color: #d32f2f; }

    .global-mode {
      margin-bottom: 12px;
      display: flex;
      justify-content: center;
    }
    .switch-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .switch-label input {
      width: 34px;
      height: 18px;
      appearance: none;
      background: #ccc;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .switch-label input:checked {
      background: #0096fa;
    }
    .switch-label input::before {
      content: "";
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .switch-label input:checked::before {
      transform: translateX(16px);
    }
    .mode-text {
      color: #555;
    }

    /* ── 选择器配置面板 ── */
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
      padding: 6px;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      user-select: none;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .settings-toggle:hover {
      color: #0096fa;
      background: #f0f8ff;
    }
    .settings-toggle .arrow {
      font-size: 10px;
      transition: transform 0.2s;
    }
    .settings-toggle.open .arrow {
      transform: rotate(180deg);
    }

    .settings-panel {
      display: none;
      margin-top: 6px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 6px;
      border: 1px solid #e8e8e8;
    }
    .settings-panel.visible {
      display: block;
    }

    .setting-row {
      margin-bottom: 6px;
    }
    .setting-row:last-of-type {
      margin-bottom: 8px;
    }
    .setting-label {
      font-size: 10px;
      color: #888;
      margin-bottom: 2px;
      display: block;
    }
    .setting-input {
      width: 100%;
      padding: 4px 6px;
      font-size: 11px;
      font-family: "Consolas", "Courier New", monospace;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      color: #333;
      outline: none;
      transition: border-color 0.15s;
    }
    .setting-input:focus {
      border-color: #0096fa;
    }

    .settings-actions {
      display: flex;
      gap: 6px;
    }
    .settings-actions button {
      flex: 1;
      padding: 5px 8px;
      font-size: 11px;
      margin: 0;
      justify-content: center;
    }
    #resetSelectorsBtn {
      color: #d32f2f;
      border-color: #ffcdd2;
    }
    #resetSelectorsBtn:hover {
      background: #fff5f5;
    }
    #saveSelectorsBtn {
      background: #0096fa;
      color: #fff;
      border-color: transparent;
    }
    #saveSelectorsBtn:hover {
      background: #0070e0;
    }
  </style>
</head>
<body>
  <div class="title">✦ Pixiv Helper</div>
  <div class="divider"></div>

  <div class="global-mode">
    <label class="switch-label">
      <input type="checkbox" id="globalModeToggle">
      <span class="mode-text">对所有 Pixiv 页面操作</span>
    </label>
  </div>

  <button id="likeBtn">
    <span class="btn-icon">👍</span>
    <span>点赞</span>
  </button>
  <button id="bookmarkBtn">
    <span class="btn-icon">❤️</span>
    <span>收藏</span>
  </button>
  <button id="followBtn">
    <span class="btn-icon">➕</span>
    <span>关注作者</span>
  </button>
  <button id="saveBtn">
    <span class="btn-icon">💾</span>
    <span>保存原图</span>
  </button>
  <button id="allBtn">
    <span class="btn-icon">⚡</span>
    <span>一键四连</span>
  </button>

  <!-- ⚙️ 选择器配置面板 -->
  <div class="settings-toggle" id="settingsToggle">
    <span>⚙️ 选择器配置</span>
    <span class="arrow">▼</span>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <label class="setting-label">点赞按钮</label>
      <input class="setting-input" id="sel_like" placeholder="CSS 选择器">
    </div>
    <div class="setting-row">
      <label class="setting-label">已点赞标记 class</label>
      <input class="setting-input" id="sel_liked" placeholder="class 名">
    </div>
    <div class="setting-row">
      <label class="setting-label">收藏按钮</label>
      <input class="setting-input" id="sel_bookmark" placeholder="CSS 选择器">
    </div>
    <div class="setting-row">
      <label class="setting-label">关注按钮</label>
      <input class="setting-input" id="sel_follow" placeholder="CSS 选择器">
    </div>
    <div class="setting-row">
      <label class="setting-label">展开容器</label>
      <input class="setting-input" id="sel_expandContainer" placeholder="CSS 选择器">
    </div>
    <div class="setting-row">
      <label class="setting-label">展开后链接</label>
      <input class="setting-input" id="sel_expandLink" placeholder="CSS 选择器">
    </div>
    <div class="setting-row">
      <label class="setting-label">原图链接备用</label>
      <input class="setting-input" id="sel_imgOriginal" placeholder="CSS 选择器">
    </div>
    <div class="settings-actions">
      <button id="resetSelectorsBtn">恢复默认</button>
      <button id="saveSelectorsBtn">保存配置</button>
    </div>
  </div>

  <div id="status" class="status">就绪</div>

  <script src="popup.js"></script>
</body>
</html>

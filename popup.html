<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixiv Helper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 220px;
      padding: 14px 12px 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #333;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: #0096fa;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin-bottom: 10px;
    }

    button {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      color: #333;
    }

    button:hover {
      background: #f0f8ff;
      border-color: #0096fa;
    }

    button:active {
      background: #e0f0ff;
    }

    #allBtn {
      background: linear-gradient(135deg, #0096fa, #005ce6);
      color: #fff;
      border-color: transparent;
      font-weight: 600;
      margin-top: 10px;
    }

    #allBtn:hover {
      background: linear-gradient(135deg, #00aaff, #0070ff);
    }

    .btn-icon {
      font-size: 15px;
    }

    .status {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      text-align: center;
      min-height: 16px;
      transition: color 0.2s;
    }

    .status.success { color: #2e7d32; }
    .status.error   { color: #d32f2f; }
  </style>
</head>
<body>
  <div class="title">✦ Pixiv Helper</div>
  <div class="divider"></div>

  <button id="likeBtn">
    <span class="btn-icon">👍</span>
    <span>点赞</span>
  </button>
  <button id="bookmarkBtn">
    <span class="btn-icon">❤️</span>
    <span>收藏</span>
  </button>
  <button id="followBtn">
    <span class="btn-icon">➕</span>
    <span>关注作者</span>
  </button>
  <button id="saveBtn">
    <span class="btn-icon">💾</span>
    <span>保存原图</span>
  </button>
  <button id="allBtn">
    <span class="btn-icon">⚡</span>
    <span>一键四连</span>
  </button>

  <div id="status" class="status">就绪</div>

  <script src="popup.js"></script>
</body>
</html>
